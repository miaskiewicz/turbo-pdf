name: CI

on:
  push:
    branches: [main]
  pull_request:

env:
  CARGO_TERM_COLOR: always
  RUSTFLAGS: "-D warnings"

jobs:
  rust:
    name: Rust (fmt, clippy, test, coverage)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy
      - uses: Swatinem/rust-cache@v2
      - name: Format
        run: cargo fmt --all -- --check
      - name: Clippy
        run: cargo clippy --workspace --all-targets -- -D warnings
      - name: Test
        run: cargo test --workspace
      - name: Complexity gate (cc < 6)
        run: cargo run --manifest-path tools/cc-check/Cargo.toml -- --max 5 crates
      - name: Coverage (100% gate)
        run: |
          cargo install cargo-tarpaulin --locked
          cargo tarpaulin --out Xml   # excludes + fail-under come from tarpaulin.toml

  js:
    name: JS/TS (oxlint, biome)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 9
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm lint
      - run: pnpm format:check

  conformance:
    name: Binding conformance (napi + wasm)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: wasm32-unknown-unknown
      - uses: Swatinem/rust-cache@v2
      - uses: pnpm/action-setup@v4
        with:
          version: 9
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
      - name: Install wasm-pack
        run: curl https://rustwasm.github.io/wasm-pack/installer/init.sh -sSf | sh
      - name: Install qpdf (deep PDF --check)
        run: sudo apt-get update && sudo apt-get install -y qpdf
      - run: pnpm install --frozen-lockfile
      # Build the SHIPPED packages, then assert capabilities against them.
      - name: Build napi addon
        run: |
          cargo build -p turbo-pdf-napi --release
          node crates/turbo-pdf-napi/scripts/copy-addon.mjs
      - name: Build wasm pkg
        # encrypt/append pull getrandom 0.3 on wasm32 → needs the Web-Crypto backend.
        env:
          RUSTFLAGS: '-D warnings --cfg getrandom_backend="wasm_js"'
        run: wasm-pack build crates/turbo-pdf-wasm --target nodejs --out-dir pkg-node
      # Per-binding conformance: assert the v0.1.1 capability surface (images,
      # watermark, pdfA/pdfUa/cmyk, encryption + qpdf round-trip, append) against
      # the BUILT packages, so a binding that drops a capability fails CI.
      - name: napi conformance + e2e
        run: node --test crates/turbo-pdf-napi/__test__/*.test.mjs
      - name: wasm conformance
        run: node --test crates/turbo-pdf-wasm/__test__/conformance.test.mjs
      - name: Build + test python binding
        run: |
          python3 -m pip install --upgrade pip maturin pytest
          maturin develop --manifest-path crates/turbo-pdf-py/Cargo.toml
          python3 -m pytest crates/turbo-pdf-py/tests -q
