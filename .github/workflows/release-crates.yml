# =============================================================================
# Release (crates.io) — tag-gated publish of the pure-Rust crates.
#
# On a `v*` tag (the SAME tag as the npm release; first: v0.1.0) this publishes,
# IN ORDER:
#   1. turbo-pdf-core      — the pure-Rust HTML/CSS+Jinja → PDF engine
#   2. turbo-html2pdf-mcp  — the MCP server binary (`cargo install turbo-html2pdf-mcp`)
#
# Order matters: the mcp crate depends on turbo-pdf-core from the registry, so
# core must land first. `cargo publish` blocks until the just-published crate is
# available in the index before returning, so the sequential publish resolves.
#
# The napi / py / wasm bindings are cdylibs shipped to npm/PyPI — not useful as
# crates — and are NOT published here.
#
# Gated on the `CARGO_REGISTRY_TOKEN` secret (what `cargo publish` reads
# natively): until it is set the publish steps are a no-op (dry-run only), so a
# tag cannot trigger an accidental release. Re-running a tag for an
# already-published version errors loudly rather than double-publishing.
# =============================================================================

name: Release (crates.io)

on:
  push:
    tags: ['v*'] # shares the npm release tag.

permissions:
  contents: read

jobs:
  publish:
    name: publish crates to crates.io
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/v')
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2

      # Verify the core crate packages + verify-builds cleanly BEFORE touching
      # the token — a bad package fails here, not half-way through publishing.
      # The mcp crate can NOT be packaged here: it depends on turbo-pdf-core from
      # the registry, which is not published until the step below. `cargo publish`
      # runs its own verify build for mcp, by then core is live in the index.
      - name: Package core (dry-run verify)
        run: cargo package -p turbo-pdf-core

      - name: Guard on CARGO_REGISTRY_TOKEN
        id: guard
        env:
          CARGO_REGISTRY_TOKEN: ${{ secrets.CARGO_REGISTRY_TOKEN }}
        run: |
          if [ -z "$CARGO_REGISTRY_TOKEN" ]; then
            echo "CARGO_REGISTRY_TOKEN not set — skipping publish (verified only)."
            echo "publish=false" >> "$GITHUB_OUTPUT"
          else
            echo "publish=true" >> "$GITHUB_OUTPUT"
          fi

      # core first — cargo publish waits for it to hit the index before returning.
      - name: Publish turbo-pdf-core
        if: steps.guard.outputs.publish == 'true'
        run: cargo publish -p turbo-pdf-core
        env:
          CARGO_REGISTRY_TOKEN: ${{ secrets.CARGO_REGISTRY_TOKEN }}

      - name: Publish turbo-html2pdf-mcp
        if: steps.guard.outputs.publish == 'true'
        run: cargo publish -p turbo-html2pdf-mcp
        env:
          CARGO_REGISTRY_TOKEN: ${{ secrets.CARGO_REGISTRY_TOKEN }}
