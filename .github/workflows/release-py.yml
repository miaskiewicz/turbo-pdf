# =============================================================================
# DRAFT — Python (PyPI) release workflow for `turbo-html2pdf`.
#
# This is a SEPARATE, opt-in workflow that does NOT touch the existing npm
# `release.yml`. It builds maturin abi3 wheels (CPython 3.8+, one wheel per
# platform) plus an sdist, and publishes them to PyPI on a `pyv*` tag.
#
# It is intentionally gated on its own tag prefix (`pyv*`, e.g. `pyv0.1.0`) so
# it never fires on the existing `v*` npm release tags, and on the presence of
# the `PYPI_TOKEN` repository secret. Until that secret is configured the
# `publish` job is a no-op (it skips with a clear message), so merging this file
# cannot break or trigger an accidental release.
#
# Wheels are built from crates/turbo-pdf-py/ (manifest + pyproject there).
# =============================================================================

name: Release (PyPI)

on:
  push:
    tags: ['pyv*'] # Python-only release tag. First: pyv0.1.0. Never `v*`.
  workflow_dispatch: # Allow a manual dry-run build with no publish.

permissions:
  contents: read

jobs:
  # ---------------------------------------------------------------------------
  # 1. Build abi3 wheels across platforms + an sdist.
  #    Matrix mirrors release.yml MINUS musl (manylinux covers the common case;
  #    add musllinux later if needed).
  # ---------------------------------------------------------------------------
  build:
    name: build wheel ${{ matrix.target }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - { os: ubuntu-latest, target: x86_64, manylinux: auto }
          - { os: ubuntu-latest, target: aarch64, manylinux: auto }
          - { os: macos-latest, target: aarch64 }
          - { os: windows-latest, target: x64 }
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      # maturin-action builds the wheel from the crate's pyproject.toml. abi3
      # means ONE wheel per platform serves every CPython >= 3.8.
      - name: Build wheels
        uses: PyO3/maturin-action@v1
        with:
          target: ${{ matrix.target }}
          manylinux: ${{ matrix.manylinux }}
          args: --release --out dist --manifest-path crates/turbo-pdf-py/Cargo.toml
          working-directory: .

      - name: Upload wheels
        uses: actions/upload-artifact@v4
        with:
          name: wheels-${{ matrix.os }}-${{ matrix.target }}
          path: dist/*.whl
          if-no-files-found: error

  sdist:
    name: build sdist
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Build sdist
        uses: PyO3/maturin-action@v1
        with:
          command: sdist
          args: --out dist --manifest-path crates/turbo-pdf-py/Cargo.toml
      - uses: actions/upload-artifact@v4
        with:
          name: sdist
          path: dist/*.tar.gz
          if-no-files-found: error

  # ---------------------------------------------------------------------------
  # 2. Publish to PyPI — only on a real `pyv*` tag AND only if PYPI_TOKEN is set.
  # ---------------------------------------------------------------------------
  publish:
    name: publish to PyPI
    needs: [build, sdist]
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/pyv')
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: dist
          merge-multiple: true

      - name: Guard on PYPI_TOKEN
        id: guard
        env:
          PYPI_TOKEN: ${{ secrets.PYPI_TOKEN }}
        run: |
          if [ -z "$PYPI_TOKEN" ]; then
            echo "PYPI_TOKEN not set — skipping publish (draft workflow)."
            echo "publish=false" >> "$GITHUB_OUTPUT"
          else
            echo "publish=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Publish
        if: steps.guard.outputs.publish == 'true'
        uses: PyO3/maturin-action@v1
        env:
          MATURIN_PYPI_TOKEN: ${{ secrets.PYPI_TOKEN }}
        with:
          command: upload
          args: --non-interactive --skip-existing dist/*
