# =============================================================================
# Release workflow — tag-gated npm publish for the turbo-pdf packages.
#
# Modeled faithfully on the proven turbo-dom setup:
#   turbo-dom/.github/workflows/ci.yml   (napi build matrix + single bundled publish)
#   turbo-test/.github/workflows/ci.yml  (tag-gate + assemble + npm publish)
#
# Platform matrix = turbo-dom's matrix MINUS x86_64-apple-darwin (mac-intel),
# which is intentionally excluded (slow, unwanted).
#
# Publishes, in order, on a `v*` tag (first release: v0.1.0):
#   1. @turbo-pdf/napi      — single bundled package; every platform *.node ships
#                             inside it and index.js loads the matching local one.
#   2. @turbo-pdf/react     — pure-TS frontend (tsup build, no native step).
#   3. @turbo-pdf/template  — pure-TS frontend (tsup build, no native step).
#
# Requires repository secret NPM_TOKEN (a Classic Automation token allowed to
# publish under the @turbo-pdf scope). Already configured in GitHub.
# =============================================================================

name: Release

on:
  push:
    tags: ['v*']          # lockstep, tag-driven release. First tag: v0.1.0.

permissions:
  contents: read

jobs:
  # ---------------------------------------------------------------------------
  # 1. Build napi prebuilt binaries across platforms.
  #    Matrix = turbo-dom/.github/workflows/ci.yml `build` MINUS x86_64-apple-darwin.
  # ---------------------------------------------------------------------------
  build-napi:
    name: build @turbo-pdf/napi ${{ matrix.target }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - { os: ubuntu-latest,  target: x86_64-unknown-linux-gnu }
          - { os: ubuntu-latest,  target: x86_64-unknown-linux-musl }
          - { os: ubuntu-latest,  target: aarch64-unknown-linux-gnu }
          - { os: macos-latest,   target: aarch64-apple-darwin }
          - { os: windows-latest, target: x86_64-pc-windows-msvc }
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 9            # this repo is a pnpm 9 workspace (pnpm-workspace.yaml)

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Linux musl deps
        if: matrix.target == 'x86_64-unknown-linux-musl'
        run: sudo apt-get update && sudo apt-get install -y musl-tools

      - name: Linux aarch64 cross toolchain
        if: matrix.target == 'aarch64-unknown-linux-gnu'
        run: |
          sudo apt-get update && sudo apt-get install -y gcc-aarch64-linux-gnu
          echo "CARGO_TARGET_AARCH64_UNKNOWN_LINUX_GNU_LINKER=aarch64-linux-gnu-gcc" >> "$GITHUB_ENV"
          echo "CC_aarch64_unknown_linux_gnu=aarch64-linux-gnu-gcc" >> "$GITHUB_ENV"

      - uses: Swatinem/rust-cache@v2
        with:
          key: ${{ matrix.target }}

      - name: Install JS deps (no postinstall build)
        run: pnpm install --frozen-lockfile --ignore-scripts

      # `napi build --platform` emits `turbo-pdf-napi.<platform>.node` into the
      # napi package dir (its package.json carries the `napi` config). Run from
      # there so the suffixed file lands next to index.js.
      - name: Build native addon (@turbo-pdf/napi)
        working-directory: crates/turbo-pdf-napi
        run: pnpm exec napi build --platform --release --target ${{ matrix.target }}

      - name: Upload prebuilt binary
        uses: actions/upload-artifact@v4
        with:
          name: napi-bindings-${{ matrix.target }}
          path: crates/turbo-pdf-napi/*.node
          if-no-files-found: error

  # ---------------------------------------------------------------------------
  # 2. Quality gate before any publish.
  #    Mirrors turbo-dom's `publish: needs: [build, test]`. Re-runs the Rust
  #    gate inline rather than editing the live .github/workflows/ci.yml.
  # ---------------------------------------------------------------------------
  gate:
    name: gate (rust fmt/clippy/test)
    runs-on: ubuntu-latest
    env:
      RUSTFLAGS: "-D warnings"
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy
      - uses: Swatinem/rust-cache@v2
      - name: Format
        run: cargo fmt --all -- --check
      - name: Clippy
        run: cargo clippy --workspace --all-targets -- -D warnings
      - name: Test
        run: cargo test --workspace

  # ---------------------------------------------------------------------------
  # 3. Publish @turbo-pdf/napi — single bundled package.
  #    All platform *.node binaries ship inside the one package; index.js selects
  #    the matching local binary at runtime (turbo-dom `publish` job pattern).
  # ---------------------------------------------------------------------------
  publish-napi:
    name: publish @turbo-pdf/napi
    needs: [build-napi, gate]
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          registry-url: https://registry.npmjs.org

      - name: Download all prebuilt binaries
        uses: actions/download-artifact@v4
        with:
          pattern: napi-bindings-*
          path: artifacts

      - name: Bundle binaries into the @turbo-pdf/napi package root
        run: |
          # Drop every *.node next to the package's index.js loader.
          DEST=crates/turbo-pdf-napi
          find artifacts -name '*.node' -exec cp {} "$DEST"/ \;
          ls -1 "$DEST"/*.node

      - name: Publish @turbo-pdf/napi
        run: npm publish --access public --ignore-scripts
        working-directory: crates/turbo-pdf-napi
        # --ignore-scripts: binaries are already built; skip any prepublish rebuild.
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

  # ---------------------------------------------------------------------------
  # 4. Publish the pure-TS frontends AFTER napi is on the registry.
  #    No native step — just a tsup build + npm publish. (packages/react,
  #    packages/template already build with tsup -> dist/.)
  # ---------------------------------------------------------------------------
  publish-frontends:
    name: publish @turbo-pdf/react + @turbo-pdf/template
    needs: [publish-napi]
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    strategy:
      matrix:
        pkg: [react, template]
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 9
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
          registry-url: https://registry.npmjs.org

      - run: pnpm install --frozen-lockfile

      - name: Build ${{ matrix.pkg }}
        run: pnpm --filter @turbo-pdf/${{ matrix.pkg }} build

      - name: Publish @turbo-pdf/${{ matrix.pkg }}
        run: pnpm --filter @turbo-pdf/${{ matrix.pkg }} publish --access public --no-git-checks
        # pnpm publish rewrites any `workspace:` dep on @turbo-pdf/napi to the
        # real version. --no-git-checks: tag-driven; tree matches tagged commit.
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
