# =============================================================================
# Release workflow — tag-gated npm publish for the turbo-pdf packages.
#
# Modeled faithfully on the proven turbo-dom setup:
#   turbo-dom/.github/workflows/ci.yml   (napi build matrix + single bundled publish)
#   turbo-test/.github/workflows/ci.yml  (tag-gate + assemble + npm publish)
#
# Platform matrix = turbo-dom's matrix MINUS x86_64-apple-darwin (mac-intel),
# which is intentionally excluded (slow, unwanted).
#
# Publishes, in order, on a `v*` tag (first release: v0.1.0):
#   1. turbo-html2pdf      — single bundled package; every platform *.node ships
#                             inside it and index.js loads the matching local one.
#   2. turbo-html2pdf-react     — pure-TS frontend (tsup build, no native step).
#   3. turbo-html2pdf-template  — pure-TS frontend (tsup build, no native step).
#
# Requires repository secret NPM_TOKEN (a Classic Automation token allowed to
# publish under public npm (unscoped names)). Already configured in GitHub.
# =============================================================================

name: Release

on:
  push:
    tags: ['v*']          # lockstep, tag-driven release. First tag: v0.1.0.

permissions:
  contents: read

jobs:
  # ---------------------------------------------------------------------------
  # 1. Build napi prebuilt binaries across platforms.
  #    Matrix = turbo-dom/.github/workflows/ci.yml `build` MINUS x86_64-apple-darwin.
  # ---------------------------------------------------------------------------
  build-napi:
    name: build turbo-html2pdf ${{ matrix.target }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - { os: ubuntu-latest,  target: x86_64-unknown-linux-gnu }
          - { os: ubuntu-latest,  target: aarch64-unknown-linux-gnu }
          - { os: macos-latest,   target: aarch64-apple-darwin }
          - { os: windows-latest, target: x86_64-pc-windows-msvc }
    steps:
      - uses: actions/checkout@v4

      # Version comes from package.json "packageManager" (pnpm@9). Do NOT also set
      # `version:` here — action-setup@v4 errors on "multiple versions specified".
      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Linux aarch64 cross toolchain
        if: matrix.target == 'aarch64-unknown-linux-gnu'
        run: |
          sudo apt-get update && sudo apt-get install -y gcc-aarch64-linux-gnu
          echo "CARGO_TARGET_AARCH64_UNKNOWN_LINUX_GNU_LINKER=aarch64-linux-gnu-gcc" >> "$GITHUB_ENV"
          echo "CC_aarch64_unknown_linux_gnu=aarch64-linux-gnu-gcc" >> "$GITHUB_ENV"

      - uses: Swatinem/rust-cache@v2
        with:
          key: ${{ matrix.target }}

      - name: Install JS deps (no postinstall build)
        run: pnpm install --frozen-lockfile --ignore-scripts

      # `napi build --platform` emits `turbo-pdf-napi.<platform>.node` into the
      # napi package dir (its package.json carries the `napi` config). Run from
      # there so the suffixed file lands next to index.js.
      - name: Build native addon (turbo-html2pdf)
        working-directory: crates/turbo-pdf-napi
        run: pnpm exec napi build --platform --release --target ${{ matrix.target }}

      - name: Upload prebuilt binary
        uses: actions/upload-artifact@v4
        with:
          name: napi-bindings-${{ matrix.target }}
          path: crates/turbo-pdf-napi/*.node
          if-no-files-found: error

  # ---------------------------------------------------------------------------
  # 1b. Build the musl napi binary in a REAL musl (Alpine) container.
  #     The glibc matrix above CANNOT produce a musl binary: passing
  #     `--target x86_64-unknown-linux-musl` on a glibc runner only renames the
  #     output — host gcc still links glibc, so the `.node` carries the
  #     `ld-linux-x86-64.so.2` loader + GLIBC_* symbols and dies on Alpine with
  #     ERR_DLOPEN_FAILED. (Every v0.1.0–v0.1.4 musl artifact was this fake-musl.)
  #     Building inside napi-rs's musl image links real musl. The load+render
  #     smoke step runs on musl Node, so a glibc-linked binary fails here exactly
  #     like production and blocks the publish — fake-musl can never ship again.
  # ---------------------------------------------------------------------------
  build-napi-musl:
    name: build turbo-html2pdf x86_64-unknown-linux-musl
    runs-on: ubuntu-latest
    container: ghcr.io/napi-rs/napi-rs/nodejs-rust:lts-alpine
    steps:
      - uses: actions/checkout@v4
      - name: Trust the workspace (container runs as root)
        run: git config --global --add safe.directory '*'
      - name: Enable pnpm via corepack
        run: corepack enable
      - name: Install JS deps (no postinstall build)
        run: pnpm install --frozen-lockfile --ignore-scripts
      - name: Build native addon (musl)
        working-directory: crates/turbo-pdf-napi
        run: pnpm exec napi build --platform --release --target x86_64-unknown-linux-musl
      - name: Smoke gate — musl .node must load AND render under musl Node
        working-directory: crates/turbo-pdf-napi
        run: |
          test -f turbo-pdf-napi.linux-x64-musl.node || { echo "musl .node missing"; exit 1; }
          node -e "const m=require('./index.js'); const pdf=m.render('<p>musl smoke</p>',{css:'@page{size:120px 80px;margin:8px}',now:0}); if(!Buffer.isBuffer(pdf)||pdf.subarray(0,5).toString()!=='%PDF-'){console.error('not a PDF');process.exit(1)}; console.log('musl load+render OK',pdf.length,'bytes');"
      - name: Upload prebuilt binary
        uses: actions/upload-artifact@v4
        with:
          name: napi-bindings-x86_64-unknown-linux-musl
          path: crates/turbo-pdf-napi/*.node
          if-no-files-found: error

  # ---------------------------------------------------------------------------
  # 2. Quality gate before any publish.
  #    Mirrors turbo-dom's `publish: needs: [build, test]`. Re-runs the Rust
  #    gate inline rather than editing the live .github/workflows/ci.yml.
  # ---------------------------------------------------------------------------
  gate:
    name: gate (rust fmt/clippy/test)
    runs-on: ubuntu-latest
    env:
      RUSTFLAGS: "-D warnings"
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy
      - uses: Swatinem/rust-cache@v2
      - name: Format
        run: cargo fmt --all -- --check
      - name: Clippy
        run: cargo clippy --workspace --all-targets -- -D warnings
      - name: Test
        run: cargo test --workspace

  # ---------------------------------------------------------------------------
  # 3. Publish turbo-html2pdf — single bundled package.
  #    All platform *.node binaries ship inside the one package; index.js selects
  #    the matching local binary at runtime (turbo-dom `publish` job pattern).
  # ---------------------------------------------------------------------------
  publish-napi:
    name: publish turbo-html2pdf
    needs: [build-napi, build-napi-musl, gate]
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          registry-url: https://registry.npmjs.org

      - name: Download all prebuilt binaries
        uses: actions/download-artifact@v4
        with:
          pattern: napi-bindings-*
          path: artifacts

      - name: Bundle binaries into the turbo-html2pdf package root
        run: |
          # Drop every *.node next to the package's index.js loader.
          DEST=crates/turbo-pdf-napi
          find artifacts -name '*.node' -exec cp {} "$DEST"/ \;
          ls -1 "$DEST"/*.node

      - name: Guard — musl binary must be real musl (no glibc loader/symbols)
        working-directory: crates/turbo-pdf-napi
        run: |
          f=turbo-pdf-napi.linux-x64-musl.node
          test -f "$f" || { echo "missing $f"; exit 1; }
          if strings -a "$f" | grep -qE 'ld-linux-x86-64\.so\.2|GLIBC_[0-9]'; then
            echo "FAIL: $f is glibc-linked, not musl — refusing to publish"; exit 1
          fi
          echo "OK: $f is musl-linked"

      - name: Publish turbo-html2pdf
        run: npm publish --access public --ignore-scripts
        working-directory: crates/turbo-pdf-napi
        # --ignore-scripts: binaries are already built; skip any prepublish rebuild.
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

  # ---------------------------------------------------------------------------
  # 4. Publish the pure-TS frontends AFTER napi is on the registry.
  #    No native step — just a tsup build + npm publish. (packages/react,
  #    packages/template already build with tsup -> dist/.)
  # ---------------------------------------------------------------------------
  publish-frontends:
    name: publish turbo-html2pdf-react + turbo-html2pdf-template
    needs: [publish-napi]
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    strategy:
      matrix:
        pkg: [react, template]
    steps:
      - uses: actions/checkout@v4
      # Version from package.json "packageManager"; no `version:` (see above).
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
          registry-url: https://registry.npmjs.org

      - run: pnpm install --frozen-lockfile

      - name: Build ${{ matrix.pkg }}
        run: pnpm --filter turbo-html2pdf-${{ matrix.pkg }} build

      - name: Publish turbo-html2pdf-${{ matrix.pkg }}
        run: pnpm --filter turbo-html2pdf-${{ matrix.pkg }} publish --access public --no-git-checks
        # pnpm publish rewrites any `workspace:` dep on turbo-html2pdf to the
        # real version. --no-git-checks: tag-driven; tree matches tagged commit.
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

  # ---------------------------------------------------------------------------
  # 5. Publish turbo-html2pdf-wasm — the in-browser package.
  #    wasm-pack produces the .wasm + JS glue; the whole HTML/CSS->PDF engine runs
  #    client-side. Independent of napi (no native step), so it only needs `gate`.
  # ---------------------------------------------------------------------------
  publish-wasm:
    name: publish turbo-html2pdf-wasm
    needs: [gate]
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: wasm32-unknown-unknown
      - uses: Swatinem/rust-cache@v2
        with:
          key: wasm
      # Install wasm-pack via the official installer (same as ci.yml). The
      # jetli/wasm-pack-action 'latest' lookup hits the GitHub releases API and
      # reliably gets rate-limited HTML ('Unexpected token <, <!DOCTYPE'); the
      # installer script fetches the binary directly and is robust.
      - name: Install wasm-pack
        run: curl https://rustwasm.github.io/wasm-pack/installer/init.sh -sSf | sh
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          registry-url: https://registry.npmjs.org

      - name: Build the browser package
        # encrypt/append pull getrandom 0.3, which needs an explicit wasm RNG
        # backend opt-in (routes salts/IVs to the Web Crypto API).
        env:
          RUSTFLAGS: '--cfg getrandom_backend="wasm_js"'
        run: wasm-pack build crates/turbo-pdf-wasm --target web --out-dir pkg --release

      - name: Stamp package name + version from the tag
        working-directory: crates/turbo-pdf-wasm/pkg
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          node -e "const fs=require('fs');const p=JSON.parse(fs.readFileSync('package.json'));p.name='turbo-html2pdf-wasm';p.version='$VERSION';p.repository={type:'git',url:'git+https://github.com/miaskiewicz/turbo-html2pdf.git'};fs.writeFileSync('package.json',JSON.stringify(p,null,2));console.log('publishing',p.name,p.version)"

      - name: Publish turbo-html2pdf-wasm
        run: npm publish --access public
        working-directory: crates/turbo-pdf-wasm/pkg
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

  # ---------------------------------------------------------------------------
  # 6. Publish turbo-html2pdf-wasm-fonts — the batteries-included browser package.
  #    Identical to publish-wasm but built with `--features bundled-fonts`, so the
  #    ~6 MB OFL font set is embedded in the `.wasm` and the browser renders with
  #    no caller fonts. Shipped as a SEPARATE package so the default
  #    turbo-html2pdf-wasm stays lean; callers opt into the heavier variant.
  # ---------------------------------------------------------------------------
  publish-wasm-fonts:
    name: publish turbo-html2pdf-wasm-fonts
    needs: [gate]
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: wasm32-unknown-unknown
      - uses: Swatinem/rust-cache@v2
        with:
          key: wasm-fonts
      # Install wasm-pack via the official installer (same as ci.yml). The
      # jetli/wasm-pack-action 'latest' lookup hits the GitHub releases API and
      # reliably gets rate-limited HTML ('Unexpected token <, <!DOCTYPE'); the
      # installer script fetches the binary directly and is robust.
      - name: Install wasm-pack
        run: curl https://rustwasm.github.io/wasm-pack/installer/init.sh -sSf | sh
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          registry-url: https://registry.npmjs.org

      - name: Build the batteries-included browser package
        env:
          RUSTFLAGS: '--cfg getrandom_backend="wasm_js"'
        run: wasm-pack build crates/turbo-pdf-wasm --target web --out-dir pkg-fonts --release -- --features bundled-fonts

      - name: Stamp package name + version from the tag
        working-directory: crates/turbo-pdf-wasm/pkg-fonts
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          node -e "const fs=require('fs');const p=JSON.parse(fs.readFileSync('package.json'));p.name='turbo-html2pdf-wasm-fonts';p.version='$VERSION';p.repository={type:'git',url:'git+https://github.com/miaskiewicz/turbo-html2pdf.git'};fs.writeFileSync('package.json',JSON.stringify(p,null,2));console.log('publishing',p.name,p.version)"

      - name: Publish turbo-html2pdf-wasm-fonts
        run: npm publish --access public
        working-directory: crates/turbo-pdf-wasm/pkg-fonts
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

  # ---------------------------------------------------------------------------
  # 7. Build the napi addon WITH the `svg` feature (vector <img> via resvg) for
  #    the separate turbo-html2pdf-svg package. Identical matrix to build-napi
  #    but `--features svg`; artifacts get a distinct name so publish-svg picks
  #    the right (svg-enabled) binaries.
  # ---------------------------------------------------------------------------
  build-napi-svg:
    name: build turbo-html2pdf-svg ${{ matrix.target }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - { os: ubuntu-latest,  target: x86_64-unknown-linux-gnu }
          - { os: ubuntu-latest,  target: aarch64-unknown-linux-gnu }
          - { os: macos-latest,   target: aarch64-apple-darwin }
          - { os: windows-latest, target: x86_64-pc-windows-msvc }
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}
      - name: Linux aarch64 cross toolchain
        if: matrix.target == 'aarch64-unknown-linux-gnu'
        run: |
          sudo apt-get update && sudo apt-get install -y gcc-aarch64-linux-gnu
          echo "CARGO_TARGET_AARCH64_UNKNOWN_LINUX_GNU_LINKER=aarch64-linux-gnu-gcc" >> "$GITHUB_ENV"
          echo "CC_aarch64_unknown_linux_gnu=aarch64-linux-gnu-gcc" >> "$GITHUB_ENV"
      - uses: Swatinem/rust-cache@v2
        with:
          key: ${{ matrix.target }}-svg
      - name: Install JS deps (no postinstall build)
        run: pnpm install --frozen-lockfile --ignore-scripts
      # `--features svg` forwards to cargo, turning on the napi crate's svg
      # passthrough (= turbo-pdf-core/svg). Same suffixed *.node filename.
      - name: Build native addon (turbo-html2pdf-svg)
        working-directory: crates/turbo-pdf-napi
        run: pnpm exec napi build --platform --release --target ${{ matrix.target }} --features svg
      - name: Upload prebuilt binary
        uses: actions/upload-artifact@v4
        with:
          name: napi-svg-bindings-${{ matrix.target }}
          path: crates/turbo-pdf-napi/*.node
          if-no-files-found: error

  # ---------------------------------------------------------------------------
  # 7b. Build the svg-enabled musl binary in a real musl (Alpine) container.
  #     Same fake-musl trap as build-napi-musl, with `--features svg`. Smoke
  #     gate (load + render under musl Node) blocks a glibc-linked artifact.
  # ---------------------------------------------------------------------------
  build-napi-svg-musl:
    name: build turbo-html2pdf-svg x86_64-unknown-linux-musl
    runs-on: ubuntu-latest
    container: ghcr.io/napi-rs/napi-rs/nodejs-rust:lts-alpine
    steps:
      - uses: actions/checkout@v4
      - name: Trust the workspace (container runs as root)
        run: git config --global --add safe.directory '*'
      - name: Enable pnpm via corepack
        run: corepack enable
      - name: Install JS deps (no postinstall build)
        run: pnpm install --frozen-lockfile --ignore-scripts
      - name: Build native addon (musl, svg)
        working-directory: crates/turbo-pdf-napi
        run: pnpm exec napi build --platform --release --target x86_64-unknown-linux-musl --features svg
      - name: Smoke gate — musl .node must load AND render under musl Node
        working-directory: crates/turbo-pdf-napi
        run: |
          test -f turbo-pdf-napi.linux-x64-musl.node || { echo "musl .node missing"; exit 1; }
          node -e "const m=require('./index.js'); const pdf=m.render('<p>musl svg smoke</p>',{css:'@page{size:120px 80px;margin:8px}',now:0}); if(!Buffer.isBuffer(pdf)||pdf.subarray(0,5).toString()!=='%PDF-'){console.error('not a PDF');process.exit(1)}; console.log('musl svg load+render OK',pdf.length,'bytes');"
      - name: Upload prebuilt binary
        uses: actions/upload-artifact@v4
        with:
          name: napi-svg-bindings-x86_64-unknown-linux-musl
          path: crates/turbo-pdf-napi/*.node
          if-no-files-found: error

  # ---------------------------------------------------------------------------
  # 8. Publish turbo-html2pdf-svg — the svg-enabled napi package. Mirrors
  #    publish-napi, but bundles the svg-built binaries and renames the package
  #    to turbo-html2pdf-svg before publishing (same version from package.json).
  # ---------------------------------------------------------------------------
  publish-svg:
    name: publish turbo-html2pdf-svg
    needs: [build-napi-svg, build-napi-svg-musl, gate]
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          registry-url: https://registry.npmjs.org

      - name: Download all svg-enabled prebuilt binaries
        uses: actions/download-artifact@v4
        with:
          pattern: napi-svg-bindings-*
          path: artifacts

      - name: Bundle binaries + rename package to turbo-html2pdf-svg
        run: |
          DEST=crates/turbo-pdf-napi
          find artifacts -name '*.node' -exec cp {} "$DEST"/ \;
          ls -1 "$DEST"/*.node
          # Same version (from package.json); only the package name changes so the
          # svg build ships under its own npm name alongside turbo-html2pdf.
          node -e "const fs=require('fs');const p='$DEST/package.json';const j=JSON.parse(fs.readFileSync(p));j.name='turbo-html2pdf-svg';fs.writeFileSync(p,JSON.stringify(j,null,2));console.log('publishing',j.name,j.version)"

      - name: Guard — musl binary must be real musl (no glibc loader/symbols)
        working-directory: crates/turbo-pdf-napi
        run: |
          f=turbo-pdf-napi.linux-x64-musl.node
          test -f "$f" || { echo "missing $f"; exit 1; }
          if strings -a "$f" | grep -qE 'ld-linux-x86-64\.so\.2|GLIBC_[0-9]'; then
            echo "FAIL: $f is glibc-linked, not musl — refusing to publish"; exit 1
          fi
          echo "OK: $f is musl-linked"

      - name: Publish turbo-html2pdf-svg
        run: npm publish --access public --ignore-scripts
        working-directory: crates/turbo-pdf-napi
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
