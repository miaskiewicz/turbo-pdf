# Coverage gate for the shipped crates. Dev tooling (tools/*) and benchmark
# harnesses (benches/*) are not part of the product surface and are excluded.
# The N-API, PyO3, and WASM bindings are thin cdylib shims over the covered
# core: a Node addon / Python extension / wasm32 module that tarpaulin cannot
# line-instrument on the host. Their files are excluded from the coverage
# surface; the napi and py crates are also excluded from the tarpaulin build so
# their native-link step never runs here.
[default]
workspace = true
exclude = ["turbo-pdf-napi", "turbo-pdf-py", "turbo-html2pdf-mcp"]
# Pin the LLVM source-based engine on EVERY platform. tarpaulin's `Auto` engine
# picks `Llvm` on macOS but `Ptrace` on Linux, and the two disagree about both
# line attribution and whether the integration `tests/*.rs` files belong in the
# denominator — so a tree that is 100% under `Llvm` (the engine this gate was
# authored against) reports ~95% under `Ptrace` in CI. Forcing `Llvm` makes the
# host and the Linux runner produce the same numbers. Needs `llvm-tools-preview`
# (added to the toolchain in .github/workflows/ci.yml's coverage job).
engine = "Llvm"
exclude-files = [
    "tools/*",
    "benches/*",
    "crates/turbo-pdf-napi/*",
    "crates/turbo-pdf-py/*",
    "crates/turbo-pdf-wasm/*",
    # The MCP server is a thin stdio JSON-RPC shim over the covered core (a
    # `bin` + protocol `lib`), the same shape as the napi/py/wasm bindings. Its
    # own protocol surface is unit-tested in-crate; it carries no core logic, so
    # it is kept out of the default coverage gate.
    "crates/turbo-html2pdf-mcp/*",
    # Opt-in hot-path instrumentation (the `perf` feature); off in normal builds
    # and covered functionally by the `--features perf` tests in tests/perf.rs.
    "crates/turbo-html2pdf-core/src/perf.rs",
    # Opt-in `endnotes` feature (Phase 15); off in normal builds — not compiled
    # under default features, so it is not in the default coverage surface (the
    # same way perf.rs is). Covered by the `--features endnotes` tests in
    # tests/endnotes.rs. Listed here defensively so a stray tarpaulin cfg quirk
    # cannot flag the gated-out module. (The other Phase 15 gated code —
    # `print-color` in emit/color.rs and layout/value.rs — lives in files that
    # carry real default coverage, so it cannot be file-excluded; its gated lines
    # simply are not compiled by default and so never enter the report.)
    "crates/turbo-html2pdf-core/src/endnotes.rs",
    # Opt-in `append` feature: off in normal builds — not compiled under default
    # features (its `lopdf` dep is `optional`), so its lines never enter the
    # default coverage surface, the same way `endnotes.rs` above does not.
    # Covered by the `--features append` tests in tests/append.rs. Listed here
    # defensively so a stray tarpaulin cfg quirk cannot flag the gated-out module.
    "crates/turbo-html2pdf-core/src/append.rs",
    # Opt-in `svg` feature (Phase 15b); off in normal builds — `resvg`/`usvg` are
    # not even a dependency without `--features svg`, so this module is not
    # compiled under default features and is not in the default coverage surface
    # (the same way perf.rs / endnotes.rs are). Covered by the `--features svg`
    # tests in tests/svg.rs. Listed here defensively so a stray tarpaulin cfg
    # quirk cannot flag the gated-out module.
    "crates/turbo-html2pdf-core/src/svg.rs",
    # Opt-in `xref` feature (Phase 15b, AC-3.25): internal links & cross-refs.
    # `emit/xref.rs` is wholly behind `#[cfg(feature = "xref")]` and the module is
    # only declared under that gate, so it is not compiled in the default build —
    # exactly like perf.rs / endnotes.rs. A tarpaulin source-mapping quirk still
    # flags its (uncompiled) lines, so it is excluded here; covered functionally
    # by the `--features xref` tests in tests/xref.rs. The other `xref` gated
    # code (in fragment.rs, boxgen.rs, block.rs, emit/document.rs) lives in files
    # with real default coverage, so it cannot be file-excluded; its gated lines
    # simply are not compiled by default and never enter the report.
    "crates/turbo-html2pdf-core/src/emit/xref.rs",
    # `xref` box-generation helpers (anchor names + internal link hrefs) live in
    # this gated-only sibling of boxgen.rs (declared `#[cfg(feature = "xref")]
    # #[path = "boxgen_xref.rs"] mod xref;`), so the default build does not compile
    # it — same as emit/xref.rs above. boxgen.rs itself carries real default
    # coverage; only these gated branches were relocated here so a tarpaulin cfg
    # quirk cannot flag their (uncompiled) let-else arms. Exercised by the
    # `--features xref` tests in tests/xref.rs.
    "crates/turbo-html2pdf-core/src/layout/boxgen_xref.rs",
    # Opt-in `pdf-a` feature (Phase 15b, AC-11.2: PDF/A-2b archival conformance);
    # off in normal builds — the whole module is behind `#[cfg(feature =
    # "pdf-a")]`, so it is not compiled under default features and never enters
    # the default coverage surface (same as endnotes.rs / perf.rs). Covered by
    # the `--features pdf-a` tests in tests/pdf_a.rs, which validate the output
    # with veraPDF `--flavour 2b`. Listed here defensively. (The small gated
    # branches the feature adds in emit/document.rs, emit/meta.rs and
    # emit/watermark.rs live in files that carry real default coverage; those
    # `#[cfg]` lines simply are not compiled by default, so they never appear in
    # the report.)
    "crates/turbo-html2pdf-core/src/emit/pdfa.rs",
    # Opt-in `pdf-ua` feature (Phase 15b, AC-11.1): the tagged-PDF emitter and its
    # `/ToUnicode` CMap builder are gated-only files, not compiled under default
    # features (like endnotes.rs). Covered by the `--features pdf-ua` tests in
    # tests/pdf_ua.rs (which include a veraPDF `--flavour ua1` compliance check).
    # Listed defensively. (The cross-cutting gated lines elsewhere — fragment.rs,
    # boxgen.rs, block.rs, table.rs, value.rs, text/font.rs and emit/{document,
    # page,fonts}.rs — live in files with real default coverage, so they cannot be
    # file-excluded; they are simply not compiled by default and never enter the
    # report.)
    "crates/turbo-html2pdf-core/src/emit/ua.rs",
    "crates/turbo-html2pdf-core/src/emit/tounicode.rs",
    # `pdf-ua` role derivation from the semantic HTML tag lives in this gated-only
    # sibling of boxgen.rs (declared `#[cfg(feature = "pdf-ua")] #[path =
    # "boxgen_ua.rs"] mod ua;`), so the default build does not compile it — same as
    # emit/ua.rs above. boxgen.rs itself carries real default coverage; only this
    # gated `role_of` branch was relocated here so a tarpaulin cfg quirk cannot
    # flag its (uncompiled) let-else arm. Exercised by the `--features pdf-ua`
    # tests in tests/pdf_ua.rs.
    "crates/turbo-html2pdf-core/src/layout/boxgen_ua.rs",
    # Opt-in `encrypt` feature (Phase 15b): AES-256 PDF password protection. Off
    # in normal builds — the module and its crypto deps are not compiled under
    # default features (same as perf.rs / endnotes.rs), so it is not in the
    # default coverage surface. Covered by the `--features encrypt` tests in
    # tests/encrypt.rs (a real qpdf round-trip when qpdf is on PATH). Listed
    # defensively so a stray tarpaulin cfg quirk cannot flag the gated-out module.
    "crates/turbo-html2pdf-core/src/emit/encrypt.rs",
    "crates/turbo-html2pdf-core/src/emit/encrypt/parse.rs",
    "crates/turbo-html2pdf-core/src/emit/encrypt/serialize.rs",
]
fail-under = 100.0
