# Coverage gate for the shipped crates. Dev tooling (tools/*) and benchmark
# harnesses (benches/*) are not part of the product surface and are excluded.
# The N-API, PyO3, and WASM bindings are thin cdylib shims over the covered
# core: a Node addon / Python extension / wasm32 module that tarpaulin cannot
# line-instrument on the host. Their files are excluded from the coverage
# surface; the napi and py crates are also excluded from the tarpaulin build so
# their native-link step never runs here.
[default]
workspace = true
exclude = ["turbo-pdf-napi", "turbo-pdf-py"]
exclude-files = [
    "tools/*",
    "benches/*",
    "crates/turbo-pdf-napi/*",
    "crates/turbo-pdf-py/*",
    "crates/turbo-pdf-wasm/*",
    # Opt-in hot-path instrumentation (the `perf` feature); off in normal builds
    # and covered functionally by the `--features perf` tests in tests/perf.rs.
    "crates/turbo-pdf-core/src/perf.rs",
    # Opt-in `endnotes` feature (Phase 15); off in normal builds — not compiled
    # under default features, so it is not in the default coverage surface (the
    # same way perf.rs is). Covered by the `--features endnotes` tests in
    # tests/endnotes.rs. Listed here defensively so a stray tarpaulin cfg quirk
    # cannot flag the gated-out module. (The other Phase 15 gated code —
    # `print-color` in emit/color.rs and layout/value.rs — lives in files that
    # carry real default coverage, so it cannot be file-excluded; its gated lines
    # simply are not compiled by default and so never enter the report.)
    "crates/turbo-pdf-core/src/endnotes.rs",
<<<<<<< HEAD
    # Opt-in `append` feature: off in normal builds — not compiled under default
    # features (its `lopdf` dep is `optional`), so its lines never enter the
    # default coverage surface, the same way `endnotes.rs` above does not.
    # Covered by the `--features append` tests in tests/append.rs. Listed here
    # defensively so a stray tarpaulin cfg quirk cannot flag the gated-out module.
    "crates/turbo-pdf-core/src/append.rs",
    # Opt-in `svg` feature (Phase 15b); off in normal builds — `resvg`/`usvg` are
    # not even a dependency without `--features svg`, so this module is not
    # compiled under default features and is not in the default coverage surface
    # (the same way perf.rs / endnotes.rs are). Covered by the `--features svg`
    # tests in tests/svg.rs. Listed here defensively so a stray tarpaulin cfg
    # quirk cannot flag the gated-out module.
    "crates/turbo-pdf-core/src/svg.rs",
    # Opt-in `xref` feature (Phase 15b, AC-3.25): internal links & cross-refs.
    # `emit/xref.rs` is wholly behind `#[cfg(feature = "xref")]` and the module is
    # only declared under that gate, so it is not compiled in the default build —
    # exactly like perf.rs / endnotes.rs. A tarpaulin source-mapping quirk still
    # flags its (uncompiled) lines, so it is excluded here; covered functionally
    # by the `--features xref` tests in tests/xref.rs. The other `xref` gated
    # code (in fragment.rs, boxgen.rs, block.rs, emit/document.rs) lives in files
    # with real default coverage, so it cannot be file-excluded; its gated lines
    # simply are not compiled by default and never enter the report.
    "crates/turbo-pdf-core/src/emit/xref.rs",
]
fail-under = 100.0
